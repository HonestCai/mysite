<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>墨韵 · 个人小站</title>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ========== RESET & BASE ========== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;scroll-padding-top:70px}
body{
  font-family:'Noto Serif SC','STSong','SimSun',serif;
  background:#0d0a08;
  color:#e8dcc8;
  line-height:1.8;
  overflow-x:hidden;
}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#1a1410}
::-webkit-scrollbar-thumb{background:#8b6914;border-radius:3px}

/* ========== INK WASH BACKGROUND ========== */
body::before{
  content:'';
  position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(180,130,80,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 50%, rgba(139,105,20,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(139,105,20,0.04) 0%, transparent 40%),
    radial-gradient(circle at 10% 90%, rgba(200,170,120,0.05) 0%, transparent 30%);
}
body::after{
  content:'';
  position:fixed;inset:0;z-index:-1;opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5 Q 35 15 40 10 M20 20 Q 28 22 32 18 M10 40 Q 18 30 22 35 M40 45 Q 48 38 52 42' stroke='white' fill='none' opacity='0.5'/%3E%3C/svg%3E");
  background-size:200px 200px;
}

/* ========== NAVIGATION ========== */
nav{
  position:sticky;top:0;z-index:1000;
  background:linear-gradient(180deg,rgba(13,10,8,0.98) 60%,rgba(13,10,8,0.85) 100%);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(184,134,11,0.2);
  padding:0 24px;
  display:flex;justify-content:center;align-items:center;gap:32px;
  height:64px;
}
nav a{
  font-family:'Ma Shan Zheng','STKaiti','KaiTi',cursive;
  font-size:22px;color:#b8a080;text-decoration:none;
  padding:4px 12px;border-radius:4px;
  transition:all 0.3s;position:relative;
}
nav a::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:0;height:1px;background:#c41e3a;transition:width 0.3s;
}
nav a:hover{color:#e8dcc8}
nav a:hover::after{width:80%}

/* ========== HERO ========== */
.hero{
  min-height:100vh;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;
  padding:80px 24px;position:relative;
}
.hero::before{
  content:'';position:absolute;top:15%;left:10%;width:300px;height:300px;
  background:radial-gradient(circle,rgba(139,105,20,0.1) 0%,transparent 70%);
  border-radius:50%;
}
.hero::after{
  content:'';position:absolute;bottom:20%;right:15%;width:200px;height:200px;
  background:radial-gradient(circle,rgba(196,30,58,0.06) 0%,transparent 70%);
  border-radius:50%;
}
.hero .seal{
  font-family:'Ma Shan Zheng',cursive;
  font-size:28px;color:#c41e3a;
  border:4px double #c41e3a;
  padding:16px 20px;margin-bottom:40px;
  display:inline-block;transform:rotate(-5deg);
  animation:sealAppear 1.2s ease-out;
}
@keyframes sealAppear{
  from{opacity:0;transform:rotate(-15deg) scale(0.5)}
  to{opacity:1;transform:rotate(-5deg) scale(1)}
}
.hero h1{
  font-family:'Ma Shan Zheng','STKaiti',cursive;
  font-size:clamp(48px,8vw,96px);
  color:#e8dcc8;font-weight:400;
  letter-spacing:12px;line-height:1.3;
  animation:fadeUp 1s ease-out 0.3s both;
}
.hero .subtitle{
  font-family:'ZCOOL XiaoWei','KaiTi',serif;
  font-size:clamp(18px,2.5vw,28px);
  color:#b8a080;margin-top:24px;
  letter-spacing:6px;
  animation:fadeUp 1s ease-out 0.6s both;
}
.hero .brush-line{
  width:clamp(200px,40vw,400px);height:3px;
  background:linear-gradient(90deg,transparent,#b8860b 20%,#c41e3a 50%,#b8860b 80%,transparent);
  margin:32px auto;border-radius:2px;
  animation:fadeUp 1s ease-out 0.9s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

/* ========== SECTION COMMONS ========== */
.section{padding:80px 24px;max-width:1100px;margin:0 auto}
.section-title{
  font-family:'Ma Shan Zheng',cursive;
  font-size:clamp(36px,5vw,56px);
  text-align:center;color:#e8dcc8;font-weight:400;
  margin-bottom:12px;letter-spacing:8px;
}
.section-subtitle{
  text-align:center;color:#8b7355;font-size:14px;
  letter-spacing:4px;margin-bottom:56px;
}
/* 篆刻印章装饰 */
.seal-stamp{
  display:flex;justify-content:center;margin-bottom:32px;
}
.seal-stamp span{
  font-family:'Ma Shan Zheng',cursive;
  font-size:22px;color:#c41e3a;
  border:3px solid #c41e3a;
  padding:8px 16px;transform:rotate(-3deg);
}

/* ========== DIVIDER ========== */
.ink-divider{
  height:60px;margin:0 auto;max-width:400px;
  background:radial-gradient(ellipse at center,rgba(184,134,11,0.3) 0%,transparent 70%);
  mask:linear-gradient(90deg,transparent,black 30%,black 70%,transparent);
}

/* ========== POEMS ========== */
#poems{background:linear-gradient(180deg,transparent,rgba(26,20,16,0.5) 20%,rgba(26,20,16,0.5) 80%,transparent)}
.poems-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:32px}
.poem-card{
  background:linear-gradient(135deg,#faf6ee,#f0e8d8);
  color:#2c1810;padding:40px 32px;border-radius:4px;
  box-shadow:0 4px 24px rgba(0,0,0,0.3),inset 0 0 60px rgba(139,105,20,0.05);
  transition:transform 0.3s,box-shadow 0.3s;
  position:relative;overflow:hidden;
}
.poem-card::before{
  content:'';position:absolute;top:0;left:0;width:4px;height:100%;
  background:linear-gradient(180deg,#c41e3a,#8b6914);
}
.poem-card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,0,0,0.4)}
.poem-card .poem-title{
  font-family:'Ma Shan Zheng',cursive;
  font-size:32px;color:#8b0000;margin-bottom:8px;font-weight:400;
}
.poem-card .poem-date{
  font-size:12px;color:#8b7355;letter-spacing:2px;margin-bottom:24px;
}
.poem-card .poem-body{
  font-family:'ZCOOL XiaoWei','KaiTi',serif;
  font-size:18px;line-height:2.2;white-space:pre-line;
}
.poem-card .poem-note{
  margin-top:20px;padding-top:16px;border-top:1px dashed #d4c5a0;
  font-size:14px;color:#8b7355;font-style:italic;
}

/* ========== VERTICAL POEM (special style) ========== */
.poem-vertical{
  writing-mode:vertical-rl;text-orientation:mixed;
  background:linear-gradient(180deg,#faf6ee,#f0e8d8);
  color:#2c1810;padding:48px 32px;border-radius:4px;
  box-shadow:0 4px 24px rgba(0,0,0,0.3),inset 0 0 60px rgba(139,105,20,0.05);
  min-height:420px;text-align:start;
  transition:transform 0.3s;position:relative;
}
.poem-vertical:hover{transform:translateY(-4px)}
.poem-vertical .poem-title{font-family:'Ma Shan Zheng',cursive;font-size:36px;color:#8b0000;margin-right:24px}
.poem-vertical .poem-body{font-family:'ZCOOL XiaoWei','KaiTi',serif;font-size:20px;line-height:2.2;margin-right:16px}
.poem-vertical .poem-date{font-size:12px;color:#8b7355;margin-top:16px}

/* ========== ESSAYS (Timeline) ========== */
#essays{background:linear-gradient(180deg,transparent,rgba(26,20,16,0.3) 50%,transparent)}
.timeline{position:relative;padding-left:40px}
.timeline::before{
  content:'';position:absolute;left:16px;top:0;bottom:0;
  width:1px;background:linear-gradient(180deg,transparent,#b8860b 10%,#b8860b 90%,transparent);
}
.essay-item{position:relative;margin-bottom:48px;padding-left:40px}
.essay-item::before{
  content:'';position:absolute;left:-28px;top:8px;
  width:10px;height:10px;border-radius:50%;
  background:#c41e3a;border:2px solid #b8860b;
}
.essay-item .essay-date{
  font-size:13px;color:#8b6914;letter-spacing:3px;margin-bottom:6px;
}
.essay-item .essay-title{
  font-family:'ZCOOL XiaoWei','KaiTi',serif;
  font-size:24px;color:#e8dcc8;margin-bottom:12px;
}
.essay-item .essay-body{
  color:#b8a080;font-size:15px;line-height:2;
  max-width:700px;
}

/* ========== PHOTOGRAPHY ========== */
#photos{background:linear-gradient(180deg,transparent,rgba(26,20,16,0.5) 20%,rgba(26,20,16,0.5) 80%,transparent)}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.photo-item{
  aspect-ratio:4/3;overflow:hidden;border-radius:4px;
  cursor:pointer;position:relative;
  border:3px solid transparent;transition:all 0.4s;
}
.photo-item:hover{border-color:#b8860b;transform:scale(1.02)}
.photo-item img{
  width:100%;height:100%;object-fit:cover;
  transition:transform 0.6s;
}
.photo-item:hover img{transform:scale(1.08)}
.photo-item .photo-overlay{
  position:absolute;bottom:0;left:0;right:0;
  padding:24px 16px 12px;
  background:linear-gradient(transparent,rgba(0,0,0,0.7));
  opacity:0;transition:opacity 0.3s;
}
.photo-item:hover .photo-overlay{opacity:1}
.photo-overlay .photo-title{font-size:14px;color:#e8dcc8;margin-bottom:2px}
.photo-overlay .photo-date{font-size:11px;color:#b8a080}
/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.92);justify-content:center;align-items:center;cursor:pointer}
.lightbox.active{display:flex}
.lightbox img{max-width:92vw;max-height:92vh;border:4px solid rgba(184,134,11,0.3);border-radius:2px}
.lightbox-close{position:absolute;top:24px;right:32px;font-size:40px;color:#e8dcc8;cursor:pointer;z-index:1}

/* ========== MUSIC ========== */
#music{background:linear-gradient(180deg,transparent,rgba(26,20,16,0.3) 50%,transparent)}
.music-wrap{display:grid;grid-template-columns:1fr 1fr;gap:32px}
@media(max-width:768px){.music-wrap{grid-template-columns:1fr}}
.music-box{
  background:linear-gradient(135deg,#2a2218,#1a1410);
  border:1px solid rgba(184,134,11,0.2);border-radius:6px;
  padding:24px;
}
.music-box h3{
  font-family:'Ma Shan Zheng',cursive;
  font-size:28px;color:#e8dcc8;font-weight:400;
  margin-bottom:20px;letter-spacing:4px;
}
.music-box h3::before{content:'♪ ';color:#c41e3a}
.music-box iframe{border:0;width:100%;height:380px;border-radius:4px}

/* Local player */
.player{display:flex;flex-direction:column;gap:12px}
.player .now-playing{
  text-align:center;color:#b8a080;font-size:14px;
  padding:12px;background:rgba(0,0,0,0.3);border-radius:4px;
  min-height:44px;display:flex;align-items:center;justify-content:center;
}
.player .track-list{max-height:280px;overflow-y:auto}
.player .track-item{
  padding:12px 16px;cursor:pointer;border-radius:4px;
  transition:background 0.2s;display:flex;align-items:center;gap:12px;
  color:#b8a080;border-bottom:1px solid rgba(184,134,11,0.1);
}
.player .track-item:hover{background:rgba(184,134,11,0.1);color:#e8dcc8}
.player .track-item.active{background:rgba(196,30,58,0.2);color:#e8dcc8}
.player .track-item .track-num{font-family:'Ma Shan Zheng',cursive;font-size:20px;color:#8b6914;width:28px}
.player audio{width:100%;margin-top:8px;border-radius:4px}
.player input[type="file"]{display:none}
.player .upload-btn{
  text-align:center;padding:10px;border:1px dashed #8b6914;
  border-radius:4px;color:#8b6914;cursor:pointer;
  font-size:14px;transition:all 0.3s;
}
.player .upload-btn:hover{background:rgba(139,105,20,0.1);color:#b8860b}

/* ========== FOOTER ========== */
footer{
  text-align:center;padding:80px 24px 48px;
  border-top:1px solid rgba(184,134,11,0.15);
}
footer .footer-seal{
  font-family:'Ma Shan Zheng',cursive;
  font-size:24px;color:#c41e3a;
  border:3px double #c41e3a;
  display:inline-block;padding:12px 24px;
  transform:rotate(-2deg);margin-bottom:24px;
}
footer p{color:#8b7355;font-size:13px;letter-spacing:4px}

/* ========== SCROLL ANIMATIONS ========== */
.reveal{opacity:0;transform:translateY(40px);transition:all 0.8s cubic-bezier(0.22,0.61,0.36,1)}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-delay-1{transition-delay:0.1s}
.reveal-delay-2{transition-delay:0.2s}
.reveal-delay-3{transition-delay:0.3s}
.reveal-delay-4{transition-delay:0.4s}

/* ========== EDITOR ========== */
.edit-float-btn{
  position:fixed;bottom:24px;right:24px;z-index:9990;
  width:48px;height:48px;border-radius:50%;
  background:#c41e3a;color:#fff;border:none;cursor:pointer;
  font-family:'Ma Shan Zheng',cursive;font-size:22px;
  box-shadow:0 4px 16px rgba(196,30,58,0.4);
  transition:all 0.3s;display:flex;align-items:center;justify-content:center;
}
.edit-float-btn:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(196,30,58,0.6)}
.edit-admin-bar{
  position:fixed;bottom:80px;right:24px;z-index:9990;
  display:none;flex-direction:column;gap:8px;
}
.edit-admin-bar.active{display:flex}
.edit-admin-bar button{
  padding:8px 16px;border:1px solid rgba(184,134,11,0.3);
  background:rgba(26,20,16,0.95);color:#e8dcc8;cursor:pointer;
  border-radius:4px;font-size:13px;white-space:nowrap;
  transition:all 0.2s;font-family:'Noto Serif SC',serif;
}
.edit-admin-bar button:hover{background:#2a2218;border-color:#b8860b}
.section-edit-bar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:16px;max-width:1100px;margin:0 auto 16px;padding:0 24px}
.section-edit-bar button{
  padding:6px 14px;border:1px solid rgba(184,134,11,0.2);
  background:transparent;color:#8b6914;cursor:pointer;
  border-radius:3px;font-size:12px;transition:all 0.2s;
  font-family:'Noto Serif SC',serif;
}
.section-edit-bar button:hover{background:rgba(184,134,11,0.1);color:#b8860b}
.editor-modal{
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,0.85);justify-content:center;align-items:center;
}
.editor-modal.active{display:flex}
.editor-modal .editor-content{
  background:#1a1410;border:1px solid #b8860b;border-radius:8px;
  padding:32px;max-width:560px;width:90%;max-height:80vh;overflow-y:auto;
}
.editor-modal h3{
  font-family:'Ma Shan Zheng',cursive;font-size:28px;
  color:#e8dcc8;margin-bottom:20px;font-weight:400;
}
.editor-modal label{
  display:block;font-size:13px;color:#b8a080;margin:12px 0 4px;
}
.editor-modal input, .editor-modal textarea{
  width:100%;padding:10px 12px;border:1px solid rgba(184,134,11,0.3);
  background:#0d0a08;color:#e8dcc8;border-radius:4px;
  font-family:'Noto Serif SC',serif;font-size:14px;resize:vertical;
}
.editor-modal input:focus, .editor-modal textarea:focus{
  outline:none;border-color:#b8860b;
}
.editor-modal .btn-row{display:flex;gap:12px;margin-top:20px;justify-content:flex-end}
.editor-modal .btn-row button{
  padding:10px 24px;border:none;border-radius:4px;cursor:pointer;
  font-size:14px;font-family:'Noto Serif SC',serif;
}
.editor-modal .btn-save{background:#c41e3a;color:#fff}
.editor-modal .btn-save:hover{background:#a01830}
.editor-modal .btn-delete{background:transparent;color:#c41e3a;border:1px solid #c41e3a;margin-right:auto}
.editor-modal .btn-delete:hover{background:rgba(196,30,58,0.1)}
.editor-modal .btn-cancel{background:transparent;color:#8b7355;border:1px solid #5a4a3a}
.editor-modal .btn-cancel:hover{background:rgba(139,115,85,0.1)}

/* ========== RESPONSIVE ========== */
@media(max-width:768px){
  nav{gap:16px;padding:0 12px;overflow-x:auto;justify-content:flex-start}
  nav a{font-size:18px;white-space:nowrap}
  .poems-grid{grid-template-columns:1fr}
  .timeline{padding-left:24px}
  .timeline::before{left:8px}
  .essay-item{padding-left:24px}
  .essay-item::before{left:-20px;width:8px;height:8px}
  .photo-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
}
</style>
</head>
<body>

<nav>
  <a href="#home">首页</a>
  <a href="#poems">诗稿</a>
  <a href="#essays">随笔</a>
  <a href="#photos">光影</a>
  <a href="#music">弦歌</a>
</nav>

<!-- ===== HERO ===== -->
<section class="hero" id="home" ondblclick="openEditor('hero',-1)">
  <div class="seal" id="heroSeal">墨韵</div>
  <h1 id="heroTitle">浮生若梦</h1>
  <p class="subtitle" id="heroSubtitle">以笔墨记录时光 · 以镜头定格瞬间</p>
  <div class="brush-line"></div>
</section>

<!-- ===== POEMS ===== -->
<div class="ink-divider"></div>
<section class="section" id="poems">
  <h2 class="section-title">诗稿</h2>
  <p class="section-subtitle">— 偶得之句 · 随手而记 —</p>
  <div class="section-edit-bar" style="margin-bottom:20px">
    <button onclick="openEditor('poems',-1)">+ 添加诗歌</button>
  </div>
  <div class="poems-grid" id="poemsContainer"></div>
</section>

<!-- ===== ESSAYS ===== -->
<div class="ink-divider"></div>
<section class="section" id="essays">
  <h2 class="section-title">随笔</h2>
  <p class="section-subtitle">— 浮生杂记 · 心之所感 —</p>
  <div class="section-edit-bar" style="margin-bottom:20px">
    <button onclick="openEditor('essays',-1)">+ 添加随笔</button>
  </div>
  <div class="timeline" id="essaysContainer"></div>
</section>

<!-- ===== PHOTOS ===== -->
<div class="ink-divider"></div>
<section class="section" id="photos">
  <h2 class="section-title">光影</h2>
  <p class="section-subtitle">— 镜头之下 · 世界一隅 —</p>
  <div class="section-edit-bar" style="margin-bottom:20px">
    <button onclick="openEditor('photos',-1)">+ 添加照片</button>
  </div>
  <div class="photo-grid" id="photosContainer"></div>
</section>

<!-- ===== MUSIC ===== -->
<div class="ink-divider"></div>
<section class="section" id="music">
  <h2 class="section-title">弦歌</h2>
  <p class="section-subtitle">— 耳畔之音 · 心之所向 —</p>

  <div class="music-box" style="max-width:600px;margin:0 auto">
    <div class="player">
      <div class="now-playing" id="nowPlaying">未选择曲目</div>
      <audio id="audioPlayer" controls style="width:100%"></audio>
      <div class="track-list" id="trackList"></div>
      <button class="upload-btn" onclick="document.getElementById('fileInput').click()">
        + 添加本地音乐 (mp3 / flac / wav)
      </button>
      <input type="file" id="fileInput" accept="audio/*" multiple onchange="addLocalTracks(event)">
    </div>
  </div>
</section>

<!-- ===== FOOTER ===== -->
<footer>
  <div class="footer-seal">逍遥</div>
  <p>以梦为马 · 不负韶华</p>
</footer>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
  <img id="lightboxImg" src="" alt="">
</div>

<!-- Editor Float Button -->
<button class="edit-float-btn" onclick="toggleAdmin()" title="管理">✎</button>
<div class="edit-admin-bar" id="adminBar">
  <button onclick="exportData()">导出备份</button>
  <button onclick="document.getElementById('importFile').click()">导入备份</button>
</div>
<input type="file" id="importFile" accept=".json" onchange="importData(event)" style="display:none">

<!-- Editor Modal -->
<div class="editor-modal" id="editorModal">
  <div class="editor-content">
    <h3 id="editorTitle">编辑</h3>
    <div id="editorForm"></div>
    <div class="btn-row">
      <button class="btn-delete" id="btnDelete" style="display:none" onclick="deleteItem()">删除</button>
      <button class="btn-cancel" onclick="closeEditor()">取消</button>
      <button class="btn-save" onclick="saveEditor()">保存</button>
    </div>
  </div>
</div>

<script>
// ========== SITE DATA - 在这里编辑你的内容 ==========
const siteData = {
  poems: [
    {
      title: '夜雨',

// ========== LIGHTBOX ==========
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('active');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
}
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ========== MUSIC - Local Player (IndexedDB) ==========
let localTrackList = [];
const DB_NAME = 'mysite_music';
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = function(e) {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('tracks')) {
        db.createObjectStore('tracks', { keyPath: 'id', autoIncrement: true });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function addLocalTracks(event) {
  const files = Array.from(event.target.files);
  const db = await openDB();
  const tx = db.transaction('tracks', 'readwrite');
  const store = tx.objectStore('tracks');

  for (const f of files) {
    const data = await new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(f);
    });
    const name = f.name.replace(/\.[^.]+$/, '');
    await new Promise((resolve, reject) => {
      const req = store.add({ name, data });
      req.onsuccess = resolve;
      req.onerror = reject;
    });
  }
  await new Promise(resolve => { tx.oncomplete = resolve; });
  db.close();
  event.target.value = '';
  await loadTracks();
  renderLocalTracks();
}

async function loadTracks() {
  localTrackList = [];
  try {
    const db = await openDB();
    const tx = db.transaction('tracks', 'readonly');
    const store = tx.objectStore('tracks');
    const all = await new Promise((resolve, reject) => {
      const req = store.getAll();
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    localTrackList = all;
    db.close();
  } catch(e) { localTrackList = []; }
}

async function removeTrack(id) {
  const track = localTrackList.find(t => t.id === id);
  if (!track || !confirm('删除 "' + track.name + '" ？')) return;
  const db = await openDB();
  const tx = db.transaction('tracks', 'readwrite');
  tx.objectStore('tracks').delete(id);
  await new Promise(resolve => { tx.oncomplete = resolve; });
  db.close();
  await loadTracks();
  renderLocalTracks();
  document.getElementById('nowPlaying').textContent = '未选择曲目';
  document.getElementById('audioPlayer').src = '';
}

function renderLocalTracks() {
  const list = document.getElementById('trackList');
  if (localTrackList.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#8b7355;padding:24px;font-size:13px">暂无本地音乐，点击下方按钮添加<br><span style="font-size:11px">支持 mp3 / flac / wav，单文件不限大小</span></div>';
    return;
  }
  list.innerHTML = localTrackList.map((t, i) => `
    <div class="track-item" onclick="playTrack(${i})">
      <span class="track-num">${i + 1}</span>
      <span>${t.name}</span>
      <span style="margin-left:auto;cursor:pointer;color:#8b7355;font-size:12px" onclick="event.stopPropagation();removeTrack(${t.id})">删除</span>
    </div>
  `).join('');
}

function playTrack(index) {
  const track = localTrackList[index];
  const player = document.getElementById('audioPlayer');
  player.src = track.data;
  player.play();
  document.getElementById('nowPlaying').textContent = '♫ ' + track.name;
  document.querySelectorAll('.track-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });
}

// ========== SCROLL ANIMATION ==========
function initScrollReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) e.target.classList.add('visible');
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}

function renderHero() {
  const h = siteData.hero;
  document.getElementById('heroSeal').textContent = h.seal;
  document.getElementById('heroTitle').textContent = h.title;
  document.getElementById('heroSubtitle').textContent = h.subtitle;
}

// ========== LOCAL STORAGE ==========
function saveData() {
  localStorage.setItem('mysite_poems', JSON.stringify(siteData.poems));
  localStorage.setItem('mysite_essays', JSON.stringify(siteData.essays));
  localStorage.setItem('mysite_photos', JSON.stringify(siteData.photos));
  localStorage.setItem('mysite_hero', JSON.stringify(siteData.hero));
}
function loadData() {
  try {
    const poems = localStorage.getItem('mysite_poems');
    const essays = localStorage.getItem('mysite_essays');
    const photos = localStorage.getItem('mysite_photos');
    const hero = localStorage.getItem('mysite_hero');
    if (poems) siteData.poems = JSON.parse(poems);
    if (essays) siteData.essays = JSON.parse(essays);
    if (photos) siteData.photos = JSON.parse(photos);
    if (hero) siteData.hero = JSON.parse(hero);
    renderHero();
  } catch(e) { console.log('Load failed, using defaults'); }
}

// ========== EDITOR ==========
let editingSection = '';
let editingIndex = -1;

function openEditor(section, index) {
  editingSection = section;
  editingIndex = index;
  const modal = document.getElementById('editorModal');
  const title = document.getElementById('editorTitle');
  const form = document.getElementById('editorForm');
  const btnDelete = document.getElementById('btnDelete');
  btnDelete.style.display = index >= 0 ? 'inline-block' : 'none';
  form.innerHTML = '';

  if (section === 'poems') {
    title.textContent = index >= 0 ? '编辑诗歌' : '新诗歌';
    const p = index >= 0 ? siteData.poems[index] : { title:'', date:new Date().toISOString().slice(0,10).replace(/-/g,'.'), content:'', note:'' };
    form.innerHTML = `
      <label>标题</label><input id="ef1" value="${esc(p.title)}">
      <label>日期</label><input id="ef2" value="${esc(p.date)}">
      <label>正文</label><textarea id="ef3" rows="8">${esc(p.content)}</textarea>
      <label>注释（可选）</label><input id="ef4" value="${esc(p.note)}">
    `;
  } else if (section === 'essays') {
    title.textContent = index >= 0 ? '编辑随笔' : '新随笔';
    const e = index >= 0 ? siteData.essays[index] : { date:new Date().toISOString().slice(0,10).replace(/-/g,'.'), title:'', content:'' };
    form.innerHTML = `
      <label>日期</label><input id="ef1" value="${esc(e.date)}">
      <label>标题</label><input id="ef2" value="${esc(e.title)}">
      <label>正文</label><textarea id="ef3" rows="12">${esc(e.content)}</textarea>
    `;
  } else if (section === 'photos') {
    title.textContent = index >= 0 ? '编辑照片' : '新增照片';
    const ph = index >= 0 ? siteData.photos[index] : { src:'', title:'', date:new Date().toISOString().slice(0,10).replace(/-/g,'.'), desc:'' };
    form.innerHTML = `
      <label>照片路径</label><input id="ef1" value="${esc(ph.src)}" placeholder="例如: D:/photos/sunset.jpg">
      <label>标题</label><input id="ef2" value="${esc(ph.title)}">
      <label>日期</label><input id="ef3" value="${esc(ph.date)}">
      <label>描述</label><input id="ef4" value="${esc(ph.desc)}">
    `;
  } else if (section === 'hero') {
    title.textContent = '编辑首页';
    const h = siteData.hero;
    form.innerHTML = `
      <label>印章文字</label><input id="ef1" value="${esc(h.seal)}">
      <label>大标题</label><input id="ef2" value="${esc(h.title)}">
      <label>副标题</label><input id="ef3" value="${esc(h.subtitle)}">
    `;
  }
  modal.classList.add('active');
}
function closeEditor() { document.getElementById('editorModal').classList.remove('active'); }

function saveEditor() {
  if (editingSection === 'poems') {
    const item = { title: document.getElementById('ef1').value, date: document.getElementById('ef2').value, content: document.getElementById('ef3').value, note: document.getElementById('ef4')?.value || '' };
    if (editingIndex >= 0) siteData.poems[editingIndex] = item; else siteData.poems.push(item);
    renderPoems();
  } else if (editingSection === 'essays') {
    const item = { date: document.getElementById('ef1').value, title: document.getElementById('ef2').value, content: document.getElementById('ef3').value };
    if (editingIndex >= 0) siteData.essays[editingIndex] = item; else siteData.essays.push(item);
    renderEssays();
  } else if (editingSection === 'photos') {
    const item = { src: document.getElementById('ef1').value, title: document.getElementById('ef2').value, date: document.getElementById('ef3').value, desc: document.getElementById('ef4')?.value || '' };
    if (editingIndex >= 0) siteData.photos[editingIndex] = item; else siteData.photos.push(item);
    renderPhotos();
  } else if (editingSection === 'hero') {
    siteData.hero.seal = document.getElementById('ef1').value;
    siteData.hero.title = document.getElementById('ef2').value;
    siteData.hero.subtitle = document.getElementById('ef3').value;
    renderHero();
  }
  saveData();
  initScrollReveal();
  closeEditor();
}

function deleteItem() {
  if (editingIndex < 0) return;
  if (!confirm('确定删除？')) return;
  if (editingSection === 'poems') { siteData.poems.splice(editingIndex, 1); renderPoems(); }
  else if (editingSection === 'essays') { siteData.essays.splice(editingIndex, 1); renderEssays(); }
  else if (editingSection === 'photos') { siteData.photos.splice(editingIndex, 1); renderPhotos(); }
  saveData();
  initScrollReveal();
  closeEditor();
}

function exportData() {
  const blob = new Blob([JSON.stringify(siteData, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'mysite_backup.json'; a.click();
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data.poems) siteData.poems = data.poems;
      if (data.essays) siteData.essays = data.essays;
      if (data.photos) siteData.photos = data.photos;
      if (data.music) siteData.music = data.music;
      saveData(); refreshAll();
    } catch(err) { alert('导入失败：文件格式错误'); }
  };
  reader.readAsText(file);
}

function refreshAll() {
  renderPoems(); renderEssays(); renderPhotos();
  renderLocalTracks(); initScrollReveal();
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ========== INIT ==========
(async function() {
  loadData();
  await loadTracks();
  renderPoems();
  renderEssays();
  renderPhotos();
  renderLocalTracks();
  initScrollReveal();
})();
</script>
